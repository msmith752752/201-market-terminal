<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>201 Market Terminal</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: #0b0b0f;
      color: white;
      text-align: center;
    }

    h1 {
      margin-top: 24px;
      color: #b983ff;
      letter-spacing: 2px;
    }

    .subtitle {
      color: #9da4b0;
      margin-top: -8px;
    }

    .grid {
      display: flex;
      justify-content: center;
      gap: 40px;
      margin-top: 40px;
      flex-wrap: wrap;
    }

    .card {
      background: #151520;
      padding: 24px;
      border-radius: 16px;
      width: 210px;
      border: 1px solid rgba(255,255,255,0.12);
      box-shadow: 0 0 30px rgba(0,0,0,0.35);
    }

    .symbol {
      font-size: 22px;
      font-weight: bold;
      color: #aaa;
    }

    .price {
      font-size: 34px;
      margin-top: 12px;
      font-weight: bold;
    }

    .change {
      margin-top: 10px;
      font-size: 22px;
      font-weight: bold;
    }

    .positive { color: #39d98a; }
    .negative { color: #ff4d6d; }

    #status {
      margin-top: 34px;
      color: #888;
      font-size: 16px;
    }

    .footer {
      margin-top: 30px;
      color: #666;
      font-size: 13px;
    }
  </style>
</head>

<body>

<h1>201 MARKET TERMINAL</h1>
<div class="subtitle">Live market data from EC2 backend</div>

<div class="grid">
  <div class="card">
    <div class="symbol">SPY</div>
    <div class="price" id="spyPrice">--</div>
    <div class="change" id="spyChange">Loading</div>
  </div>

  <div class="card">
    <div class="symbol">QQQ</div>
    <div class="price" id="qqqPrice">--</div>
    <div class="change" id="qqqChange">Loading</div>
  </div>

  <div class="card">
    <div class="symbol">NVDA</div>
    <div class="price" id="nvdaPrice">--</div>
    <div class="change" id="nvdaChange">Loading</div>
  </div>
</div>

<div id="status">Connecting to backend...</div>

<div class="footer">
  Informational and educational purposes only | Not financial advice
</div>

<script>
const API_URL = "http://54.147.143.148:8010/quotes";

function setMove(id, value) {
  const item = document.getElementById(id);
  item.innerText = (value >= 0 ? "+" : "") + value.toFixed(2) + "%";
  item.className = "change " + (value >= 0 ? "positive" : "negative");
}

function setPrice(id, value) {
  document.getElementById(id).innerText = "$" + Number(value).toFixed(2);
}

async function loadData() {
  const status = document.getElementById("status");
  status.innerText = "Updating from EC2 backend...";

  try {
    const response = await fetch(API_URL);
    const data = await response.json();

    if (data.SPY) {
      setPrice("spyPrice", data.SPY.price);
      setMove("spyChange", data.SPY.changePercent);
    }

    if (data.QQQ) {
      setPrice("qqqPrice", data.QQQ.price);
      setMove("qqqChange", data.QQQ.changePercent);
    }

    if (data.NVDA) {
      setPrice("nvdaPrice", data.NVDA.price);
      setMove("nvdaChange", data.NVDA.changePercent);
    }

    status.innerText = "Live Data | Last update: " + new Date().toLocaleTimeString();

  } catch (error) {
    console.error(error);
    status.innerText = "Backend connection error";
  }
}

loadData();
setInterval(loadData, 10000);
</script>

</body>
</html>
